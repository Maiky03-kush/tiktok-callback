<!DOCTYPE html>
<html>
<head><title>TikTok Auth Callback</title><meta name="tiktok-domain-verification" content="HHqnTKwxvn8ZUgE5gebbOeRSMGL9Pv4d"></head>
<body>
<p>Autorizando...</p>
<script>
  // Redirect to local server with the same query params
  const params = window.location.search;
  if (params.includes('code=')) {
    window.location.href = 'http://localhost:8080/callback' + params;
  } else {
    document.body.innerHTML = '<h2>Error: no se recibió código de autorización.</h2><pre>' + params + '</pre>';
  }
</script>
</body>
</html>
